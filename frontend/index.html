<!DOCTYPE html>
<html>
<head>
    <title>Weapon Detection System</title>
</head>
<body>

<h1>Weapon Detection System</h1>

<!-- IMAGE -->
<h3>Upload Image</h3>
<input type="file" id="imageInput">
<button onclick="uploadImage()">Detect Image</button>

<br><br>

<!-- VIDEO -->
<h3>Upload Video</h3>
<input type="file" id="videoInput">
<button onclick="uploadVideo()">Detect Video</button>

<br><br>

<!-- LIVE -->
<h3>Live Webcam</h3>
<img src="http://127.0.0.1:8000/video" width="600">

<br><br>

<img id="result" width="600"/>

<script>
async function uploadImage() {
    let file = document.getElementById("imageInput").files[0];
    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch("http://127.0.0.1:8000/predict-image", {
        method: "POST",
        body: formData
    });

    let data = await res.json();
    document.getElementById("result").src = data.output;
}

async function uploadVideo() {
    let file = document.getElementById("videoInput").files[0];
    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch("http://127.0.0.1:8000/predict-video", {
        method: "POST",
        body: formData
    });

    let data = await res.json();
    document.getElementById("result").src = data.output;
}
</script>

</body>
</html>
